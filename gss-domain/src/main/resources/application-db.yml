---
spring:
  config:
    activate:
      on-profile: dev
    import: 'aws-secretsmanager:dev/devoops/secrets'
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: false
