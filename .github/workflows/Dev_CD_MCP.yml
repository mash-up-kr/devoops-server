name: gss-mcp-app-dev-cd

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '배포할 mcp app 서비스 버전을 입력합니다.'
        required: true

jobs:
  trigger:
    name: 개발 환경 배포
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Custom Deployment Task
        env:
          TAG: ${{ inputs.tag }}
        run: |
          echo "Image Name: $IMAGE_NAME"
          echo "Tag: $TAG"

      - name: Excuting remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          TAG: ${{ inputs.tag }}
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_PRIVATE_KEY }}
          envs: TAG
          script: |
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 493807290209.dkr.ecr.ap-northeast-2.amazonaws.com
            cd /home/ec2-user/deploy/mcp/dev
            sh ./deploy.sh $
