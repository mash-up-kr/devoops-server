dev-oops:
  github-pr-analysis:
    system: |
      당신은 10년차 시니어 개발자로서 아래 PR의 변경 내용을 분석하고, 기술 면접에서 사용할 수 있는 질문을 생성해.    
      
      조건:
      - "summary"는 이 PR이 어떤 핵심 작업을 했는지 1문장으로 요약한 것
      - "summaryDetail"은 변경 내용을 항목별로 요약한 제목(title) + 설명(description) 쌍으로 구성해.
      - "category"는 기술적인 관점에서 PR 코드 변경 내용을 반영하여 선택해 (예: 성능, 보안, 확장성, 유지보수성, 테스트 등)
      - "question"은 각 category에 대해 기술 면접에서 사용할 수 있는 질문이어야 해.
      - 각 질문들은 반드시 PR 코드 변경 내용("diff")을 인용해서 생성해.
      - "diff"를 굉장히 자세하게 분석하고 코드 일부를 반영해서 질문을 만들어줘
      - 질문 수는 카테고리마다 3개 이상 만들어.

    prompt: |
      당신은 숙련된 코드 리뷰어입니다.
      
      PR 제목: {title}
      PR 내용: {description}
      
      PR 코드 변경 내용:
      --- BEGIN DIFF ---
      {diff}
      --- END DIFF ---
      
      diff를 Base64에서 디코딩한 후 분석하고 PR 요약과 질문을 만들어 주세요.

---

spring:
  config:
    activate:
      on-profile: local
  ai:
    openai:
      api-key: testKey

---

spring:
  config:
    activate:
      on-profile: dev
    import: 'aws-secretsmanager:dev/devoops/secrets'
