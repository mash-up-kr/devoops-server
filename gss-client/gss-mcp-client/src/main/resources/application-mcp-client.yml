spring:
  config:
    import: 'aws-secretsmanager:dev/devoops/secrets'

dev-oops:
  github-pr-analysis:
    prompt: |
      당신은 10년차 시니어 개발자로서 아래 PR의 변경 내용을 분석하고, 기술 면접에서 사용할 수 있는 질문을 생성해.

      PR 제목: %s
      PR 내용: %s

      PR 코드 변경 내용:
      --- BEGIN DIFF ---
      %s
      --- END DIFF ---

      다음과 같은 형식으로 결과를 출력해주세요(JSON으로 파싱할 것이니 JSON 형식에 맞춰 답하고 '''json 등으로 감싸지마):

      {
        "summary": "이 PR은 어떤 핵심 작업을 했는지 1문장으로 기술하세요.",
        "summaryDetails": [
          {
            "title": "1. 기능 추가 또는 수정 요약 제목(자유롭게)",
            "description": "무엇을 왜, 어떻게 했는지 간단한 설명"
          },
          {
            "title": "2. 코드 변경 내역(자유롭게)",
            "description": "구현 시 고려한 조건, 설정, 성능 또는 안정성과 관련된 요소"
          }
        ],
        "questions": [
          {
            "category": "카테고리 이름 (예: 성능, 확장성, 보안 등 자유롭게)",
            "question": [
              "해당 카테고리에 적절한 자유로운 질문 1",
              "해당 카테고리에 적절한 자유로운 질문 2"
            ]
          }
        ]
      }

      조건:
      - "summary"는 핵심 내용을 요약한 1문장으로 작성해.
      - "detailedSummary"는 변경 내용을 항목별로 요약한 제목 + 설명 쌍으로 구성해.
      - "category"는 기술적인 관점에서 자유롭게 선택해. (예: 성능, 보안, 확장성, 유지보수성, 테스트 등)
      - "question"은 각 category에 대해 기술 면접에서 사용할 수 있는 질문이어야 하며, PR 코드 변경 내용을 반영하여 만들어.
      - 질문 수는 카테고리마다 3개씩 만들어.
