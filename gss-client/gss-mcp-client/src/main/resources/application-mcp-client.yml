spring:
  config:
    import: 'aws-secretsmanager:dev/devoops/secrets'

dev-oops:
  github-pr-analysis:
    prompt: |
      당신은 10년차 시니어 개발자로서 아래 PR의 변경 내용을 분석하고, 기술 면접에서 사용할 수 있는 질문을 생성해야 합니다.

      PR 제목: {{title}}
      PR 내용: {{description}}

      PR 코드 변경 내용:
      --- BEGIN DIFF ---
      {{diff}}
      --- END DIFF ---

      다음과 같은 형식으로 결과를 출력해주세요:

      {
        "summary": "이 PR은 어떤 핵심 작업을 했는지 1문장으로 기술하세요.",
        "questions": [
          {
            "tag": "태그 이름 (예: 성능, 확장성, 보안 등 자유롭게)",
            "question": [
              "해당 태그에 적절한 자유로운 질문 1",
              "해당 태그에 적절한 자유로운 질문 2"
            ]
          }
        ]
      }

      조건:
      - "tag"는 기술적인 관점에서 자유롭게 선택하세요. (예: 성능, 보안, 확장성, 유지보수성, 테스트 등)
      - "question"은 해당 태그의 관점에서 기술 면접에서 사용할 수 있는 질문이어야 하며, 자유롭게 작성해 주세요.
      - 질문 수는 태그마다 1개 이상 작성해도 좋습니다.
      - 꼭 성능/정확성/확장성으로 제한하지 않아도 됩니다.
