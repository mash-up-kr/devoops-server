spring:
  profiles:
    active: test

---

spring:
  config:
    activate:
      on-profile: test
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:database
    username: sa
    password:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  flyway:
    enabled: false
  ai:
    openai:
      api-key: test
      chat.options.model: testModel

dev-oops:
  mcp:
    webhook-url: https://test.dev-oops.kr/api/webhooks
  github-pr-analysis:
    prompt: testPrompt
